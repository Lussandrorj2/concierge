            font-weight: bold;

            margin: 10px 0;

            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

            display: none;
        }

            min-width: 200px;
            max-width: 200px;
            height: 150px;

            border-radius: 8px;
            flex-shrink: 0;

            color: white;
            padding: 15px;

        function changeLang(lang) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            const clickedBtn = document.querySelector(`[onclick="changeLang('${lang}')"]`);
            if(clickedBtn) clickedBtn.classList.add('active');

            document.getElementById('txt-h1').innerText = content[lang].h1;
            document.getElementById('txt-subtitle').innerText = content[lang].subtitle;
            document.getElementById('txt-trust').innerText = content[lang].trust;
            document.getElementById('txt-section-title').innerText = content[lang].section;
            document.getElementById('txt-float-wpp').innerText = content[lang].floatWpp;

            const grid = document.getElementById('passeios');
            grid.innerHTML = '';

            content[lang].items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                let imgsHtml = '';
                item.imgs.forEach(url => imgsHtml += `<img src="${url}" alt="Rio">`);

                card.innerHTML = `
                    <h3>${item.title}</h3>
                    <div class="info">${item.info}</div>
                    <div class="price">${item.price}</div>
                    <div class="gallery">${imgsHtml}</div>
                    <p>${item.desc}</p>
                    <a class="btn" href="${item.link}" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="18" style="vertical-align:middle;margin-right:6px;">
                    ${content[lang].btn}
                    </a>
                `;
                grid.appendChild(card);
            });
        }

        changeLang('pt');
    </script>
